name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: daemon/pnpm-lock.yaml

      - name: Install daemon dependencies
        working-directory: daemon
        run: pnpm install --frozen-lockfile

      - name: Bundle daemon
        working-directory: daemon
        run: |
          pnpm run bundle
          pnpm run bundle:sandbox-client

      - name: Typecheck daemon
        working-directory: daemon
        run: pnpm exec tsc --noEmit

      - name: Install Playwright Chromium
        working-directory: daemon
        run: pnpm exec playwright install chromium

      - name: Test daemon
        working-directory: daemon
        run: pnpm vitest run

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build CLI
        run: cargo build --target x86_64-pc-windows-msvc --manifest-path cli/Cargo.toml

      - name: Check CLI
        run: cargo check --target x86_64-pc-windows-msvc --manifest-path cli/Cargo.toml
