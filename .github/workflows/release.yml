name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v0.2.8"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: daemon/pnpm-lock.yaml

      - name: Install daemon dependencies
        working-directory: daemon
        run: pnpm install --frozen-lockfile

      - name: Typecheck daemon
        working-directory: daemon
        run: pnpm exec tsc --noEmit

      - name: Bundle daemon
        working-directory: daemon
        run: |
          pnpm run bundle
          pnpm run bundle:sandbox-client

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build CLI
        run: cargo build --release --target x86_64-pc-windows-msvc --manifest-path cli/Cargo.toml

      - name: Assemble release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item cli/target/x86_64-pc-windows-msvc/release/dev-browser.exe release/dev-browser-windows-x64.exe
          Copy-Item scripts/install-windows.ps1 release/install-windows.ps1
          Get-FileHash release/dev-browser-windows-x64.exe -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  dev-browser-windows-x64.exe" } |
            Set-Content release/dev-browser-windows-x64.exe.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release/*

  github-release:
    name: Publish GitHub Release
    needs: build-windows
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: release/*
          generate_release_notes: true

  npm-latest:
    name: Publish npm latest
    needs: github-release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
          cache-dependency-path: daemon/pnpm-lock.yaml

      - name: Build daemon bundles
        working-directory: daemon
        run: |
          pnpm install --frozen-lockfile
          pnpm run bundle
          pnpm run bundle:sandbox-client

      - name: Assemble npm package
        run: |
          mkdir -p npm-dist/bin npm-dist/scripts npm-dist/daemon/dist
          cp bin/dev-browser.js npm-dist/bin/
          cp scripts/postinstall.js npm-dist/scripts/
          cp scripts/sync-version.js npm-dist/scripts/
          cp daemon/dist/daemon.bundle.mjs npm-dist/daemon/dist/
          cp daemon/dist/sandbox-client.js npm-dist/daemon/dist/
          cp package.json npm-dist/
          cp README.md npm-dist/
          cp LICENSE npm-dist/ 2>/dev/null || true

      - name: Publish to npm
        working-directory: npm-dist
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::notice::NPM_TOKEN is not configured; skipping npm publish."
            exit 0
          fi

          npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
